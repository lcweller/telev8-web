server {
  listen      80 default_server;
  listen      [::]:80 default_server;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;

  # ----- Hardening -----
  server_tokens off;

  add_header X-Content-Type-Options    "nosniff"                                                          always;
  add_header X-Frame-Options           "DENY"                                                             always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"                                  always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()"    always;
  add_header X-Robots-Tag              "all"                                                              always;

  # ----- Compression -----
  gzip                on;
  gzip_vary           on;
  gzip_proxied        any;
  gzip_comp_level     6;
  gzip_min_length     1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/woff
    font/woff2;

  # ----- Cache: immutable hashed Next chunks -----
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
    try_files $uri =404;
  }

  # ----- Cache: long for site media -----
  location /images/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    access_log off;
    try_files $uri =404;
  }

  # ----- Cache: long for fonts -----
  location ~* \.(?:woff2?|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
  }

  # ----- Cache: 1h for sitemap and robots -----
  location = /sitemap.xml {
    expires 1h;
    add_header Cache-Control "public, max-age=3600" always;
  }
  location = /robots.txt {
    expires 1h;
    add_header Cache-Control "public, max-age=3600" always;
  }

  # ----- Cache: never for HTML — content updates each deploy -----
  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # ----- Cache: long for other static assets -----
  location ~* \.(?:css|js|svg|jpg|jpeg|png|webp|avif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    access_log off;
  }

  # ----- Routing: try the URL, then with .html, then as a directory; finally 404 -----
  location / {
    try_files $uri $uri.html $uri/index.html /404.html;
  }

  # Custom 404 page rendered by Next at /404.html
  error_page 404 /404.html;
  location = /404.html {
    internal;
  }

  # Health endpoint — used by the Dockerfile HEALTHCHECK
  location = /healthz {
    access_log off;
    add_header Content-Type "text/plain" always;
    return 200 "ok\n";
  }
}
